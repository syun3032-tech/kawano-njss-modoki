# Render.com 無料プランでのデプロイ定義（ランニングコスト0円）。
# Render に GitHub リポジトリを接続すれば、この設定で自動デプロイされる。
# 無料プランは一定時間アクセスが無いとスリープ（コールドスタート）。料金はかからない。
services:
  - type: web
    name: kawano-njss-modoki
    runtime: python
    plan: free
    # ① 依存導入 → ② 応募導線ロジックの回帰テスト(AI不使用・ネット不要、壊れてたらデプロイ中止)
    # → ③ 最新の入札データを生成。すべて自動・無料。
    buildCommand: pip install -r requirements.txt && python test_procurement.py && python test_kkj.py && python update.py --fast
    # 無料プランは1インスタンス。--workers 1 で省メモリ、--timeout 60 でコールドスタート時の
    # ワーカー強制終了（既定30秒）を防ぐ。
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
      # Python を固定（将来のデフォルト更新で挙動が変わらないように）
      - key: PYTHON_VERSION
        value: "3.13.5"
