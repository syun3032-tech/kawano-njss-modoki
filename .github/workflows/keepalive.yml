name: キープアライブ（営業時間のスリープ防止）

# Render 無料プランは15分アクセスが無いとスリープし、次回起動に30秒〜1分かかる。
# 営業時間帯(JST 7:00〜22:59)だけ /healthz を5分おきに叩いて常時起動を保つ。
# 夜間は叩かないのでスリープし、Render無料枠(月750インスタンス時間)に十分収まる。
#   UTC 22:00〜13:59 = JST 7:00〜22:59（JST = UTC+9）
on:
  schedule:
    - cron: "*/5 22,23,0-13 * * *"
  workflow_dispatch: {}

# 同時実行や遅延の積み上がりを防ぐ（古い実行はキャンセル）
concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /healthz to keep Render awake
        run: |
          URL="https://kawano-njss-modoki.onrender.com/healthz"
          echo "ping $URL"
          # スリープからの起動を待つため最大90秒・数回リトライ
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "keep-alive ping did not get 200 (service may be cold-starting)"
